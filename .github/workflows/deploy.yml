name: Deploy app to AWS ECS FARGATE

on:
  push:
    branches:
    - main
  workflow_dispatch:


jobs:
  security-scan:
    name: scan code for security
    runs-on: [ ubuntu-latest ]
    if: github.event_name == 'push'

    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Print scanning message
      run: echo "Scanning code for security vulnerabilities..."
    - name: Run Trivy vulnerabilities scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        format: 'table'
        exit-code: '1'

  build-and-deploy:
    name: Package and Build Image
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Package and Build Image
      run: echo "Packaging and Building Docker Image..."

    - name: checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: echo Build Docker Image message
      run: echo "Building Docker Image..."

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: ${{ steps.login-ecr.outputs.registry }}/my-microservice:latest
    - name: print tags
      run: echo "Docker Image built and tagged as ${{ steps.login-ecr.outputs.registry }}/my-microservice:latest"
